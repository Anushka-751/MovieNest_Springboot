# Application details
spring.application.name=quicktick
server.port=8080

# MySQL Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/quicktick_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security Settings (Optional: Disable default password logging)
logging.level.org.springframework.security=INFO
